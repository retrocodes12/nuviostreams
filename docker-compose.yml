services:
  nuvio-addon:
    build: .
    image: nuvio-streams-addon:latest
    container_name: nuvio-streams-addon
    ports:
      - "7000:7000"
    env_file:
      - .env
    restart: unless-stopped

  nuvio-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: nuvio-cloudflared
    command: tunnel --no-autoupdate --url http://nuvio-addon:7000
    depends_on:
      - nuvio-addon
    restart: unless-stopped
